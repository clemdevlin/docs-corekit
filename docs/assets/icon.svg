<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f12"/>
      <stop offset="100%" style="stop-color:#13161b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89b4fa"/>
      <stop offset="100%" style="stop-color:#74c7ec"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a6e3a1"/>
      <stop offset="100%" style="stop-color:#94e2d5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="160" height="160" rx="32"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="160" height="160" rx="32" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="160" height="160" rx="32" fill="none" stroke="#23272f" stroke-width="1.5"/>

  <!-- Grid -->
  <g opacity="0.12" clip-path="url(#iconClip)">
    <line x1="0" y1="40" x2="160" y2="40" stroke="#89b4fa" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="160" y2="80" stroke="#89b4fa" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="160" y2="120" stroke="#89b4fa" stroke-width="0.5"/>
    <line x1="40" y1="0" x2="40" y2="160" stroke="#89b4fa" stroke-width="0.5"/>
    <line x1="80" y1="0" x2="80" y2="160" stroke="#89b4fa" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="160" stroke="#89b4fa" stroke-width="0.5"/>
  </g>

  <!-- Glow -->
  <ellipse cx="80" cy="80" rx="52" ry="52" fill="#89b4fa" opacity="0.07" filter="url(#softglow)"/>

  <!-- < bracket -->
  <polyline points="68,46 44,80 68,114" fill="none" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- > bracket -->
  <polyline points="92,46 116,80 92,114" fill="none" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- / slash -->
  <line x1="88" y1="50" x2="72" y2="110" stroke="url(#greenGrad)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Corner accents -->
  <rect x="13" y="13" width="9" height="2" rx="1" fill="#89b4fa" opacity="0.45"/>
  <rect x="13" y="13" width="2" height="9" rx="1" fill="#89b4fa" opacity="0.45"/>
  <rect x="138" y="13" width="9" height="2" rx="1" fill="#89b4fa" opacity="0.45"/>
  <rect x="145" y="13" width="2" height="9" rx="1" fill="#89b4fa" opacity="0.45"/>
  <rect x="13" y="145" width="9" height="2" rx="1" fill="#89b4fa" opacity="0.45"/>
  <rect x="13" y="138" width="2" height="9" rx="1" fill="#89b4fa" opacity="0.45"/>
  <rect x="138" y="145" width="9" height="2" rx="1" fill="#89b4fa" opacity="0.45"/>
  <rect x="145" y="138" width="2" height="9" rx="1" fill="#89b4fa" opacity="0.45"/>
</svg>
