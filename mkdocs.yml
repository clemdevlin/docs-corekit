site_name: "@cl3m/corekit"
site_description: A TypeScript-first general-purpose utility library for strings, arrays, objects, and dates.
site_url: https://corekit.netlify.app
repo_url: https://github.com/clemdevlin/corekit
repo_name: cl3m/corekit
edit_uri: ""

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/icon.svg
  favicon: assets/icon.svg
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Browser Support: browser.md
  - CLI: cli.md
  - API Reference:
    - strings: api/strings.md
    - arrays: api/arrays.md
    - objects: api/objects.md
    - dates: api/dates.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/clemdevlin/corekit
    - icon: fontawesome/brands/npm
      link: https://npmjs.com/package/@cl3m/corekit
